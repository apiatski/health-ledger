name: Oura nightly sync

on:
  schedule:
    # 11:00 UTC = 06:00 ET / 03:00 PT — runs once a day after the night's data has settled.
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Oura
        env:
          OURA_TOKEN: ${{ secrets.OURA_TOKEN }}
        run: node scripts/sync-oura.mjs

      - name: Commit if changed
        run: |
          git config user.name "Vitals Ledger Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/oura.json
          if git diff --cached --quiet; then
            echo "No Oura changes today."
          else
            git commit -m "Oura sync: $(date -u +%Y-%m-%d)"
            git push
          fi
