<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fafaf7" />
  <title>Health</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fafaf7;
      --card: #ffffff;
      --ink: #14110d;
      --ink-soft: #5e574d;
      --ink-faint: #a8a195;
      --border: #e8e3d6;
      --border-soft: #f0ebde;
      --accent: #b34d28;
      --accent-tint: rgba(179, 77, 40, 0.08);
      --success: #5a7d4f;

      --radius: 10px;
      --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 1rem;
      line-height: 1.5;
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      text-rendering: optimizeLegibility;
    }

    button { font: inherit; color: inherit; }
    input { font: inherit; color: inherit; }

    .page {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ──────────── topbar ──────────── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.85rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .brand .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.5rem;
      vertical-align: 1px;
    }
    .topbar-meta {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    /* ──────────── streaks ──────────── */
    .streaks {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .streak {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-soft);
      padding: 0.3rem 0.65rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s, color 0.15s;
    }
    .streak b {
      color: var(--accent);
      font-weight: 600;
      margin-right: 0.25rem;
    }
    .streak.zero {
      color: var(--ink-faint);
      border-style: dashed;
      border-color: var(--border-soft);
    }
    .streak.zero b { color: var(--ink-faint); }

    /* ──────────── cards grid ──────────── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
      margin-bottom: 1.25rem;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: flex-start;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 0.95rem;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.06s;
    }
    .card:hover { border-color: var(--ink-soft); }
    .card:active { transform: translateY(1px); }
    .card.active {
      border-color: var(--accent);
      background: var(--accent-tint);
    }
    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
    }
    .card-value {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.01em;
      font-variant-numeric: tabular-nums;
      min-height: 1.4em;
    }
    .card-value.empty { color: var(--ink-faint); }
    .card.water-card .card-value::after {
      content: " +1";
      color: var(--accent);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card.water-card:hover .card-value::after { opacity: 0.6; }

    /* ──────────── logger ──────────── */
    .logger {
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1rem 0.85rem;
      margin-bottom: 1.5rem;
      animation: slidein 0.18s ease-out;
    }
    @keyframes slidein {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .log-form { display: flex; flex-direction: column; gap: 0.5rem; }
    .log-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.25rem;
    }
    .log-cat {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      line-height: 1;
      color: var(--ink-faint);
      cursor: pointer;
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
    }
    .close-btn:hover { color: var(--ink); background: var(--bg); }
    .log-input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 0.55rem 0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
      width: 100%;
    }
    .log-value {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .log-input:focus { border-bottom-color: var(--accent); }
    .log-submit {
      align-self: flex-start;
      margin-top: 0.65rem;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 0.7rem 1.2rem;
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.01em;
    }
    .log-submit:hover { background: var(--accent); }
    .log-submit:active { transform: translateY(1px); }

    /* ──────────── section heads ──────────── */
    .sec-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      margin: 2rem 0 0.85rem;
    }
    .sec-label:first-child { margin-top: 0; }

    /* ──────────── recent ──────────── */
    .recent-list {
      list-style: none;
      border-top: 1px solid var(--border-soft);
    }
    .recent-list li {
      display: grid;
      grid-template-columns: 88px 1fr auto;
      gap: 0.85rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border-soft);
      align-items: baseline;
      transition: background 0.15s;
    }
    .recent-list li.flash {
      background: var(--accent-tint);
      border-radius: 6px;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }
    .recent-time {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .recent-body { font-size: 0.95rem; color: var(--ink); }
    .recent-body .cat {
      font-weight: 600;
      color: var(--ink-soft);
      font-size: 0.82rem;
      text-transform: capitalize;
      margin-right: 0.5rem;
    }
    .recent-body .val {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--ink);
      margin-right: 0.45rem;
      font-variant-numeric: tabular-nums;
    }
    .recent-body .note {
      color: var(--ink-soft);
      font-size: 0.92rem;
    }
    .recent-del {
      background: none;
      border: none;
      color: var(--ink-faint);
      cursor: pointer;
      font-size: 1.05rem;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }
    .recent-list li:hover .recent-del { opacity: 1; }
    .recent-del:hover { color: var(--accent); background: var(--accent-tint); }
    .recent-empty {
      padding: 1.25rem 0;
      color: var(--ink-faint);
      font-size: 0.9rem;
      text-align: center;
      font-style: italic;
      list-style: none;
    }

    /* ──────────── trends ──────────── */
    .trends-rows { display: flex; flex-direction: column; }
    .trend-row {
      display: grid;
      grid-template-columns: 92px 1fr 70px;
      gap: 1rem;
      padding: 0.55rem 0;
      align-items: center;
      border-bottom: 1px solid var(--border-soft);
    }
    .trend-row:last-child { border-bottom: none; }
    .trend-label {
      font-size: 0.85rem;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .spark {
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 2px;
      height: 28px;
      align-items: end;
    }
    .spark .bar {
      background: var(--border);
      border-radius: 1px;
      min-height: 3px;
      transition: background 0.2s;
    }
    .spark .bar.has { background: var(--ink-faint); }
    .spark .bar.today { background: var(--accent); }
    .trend-current {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--ink);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .trend-current.empty { color: var(--ink-faint); }

    /* ──────────── footer ──────────── */
    .page-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-soft);
    }
    .text-btn {
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--ink-faint);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem 0;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .text-btn:hover { color: var(--accent); }

    /* ──────────── responsive ──────────── */
    @media (max-width: 540px) {
      body { padding: 1rem 0.85rem 3rem; }
      .topbar { margin-bottom: 1.25rem; }
      .cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.55rem;
      }
      .recent-list li {
        grid-template-columns: 70px 1fr;
        gap: 0.5rem;
      }
      .recent-del { grid-column: 2; justify-self: end; opacity: 0.4; }
      .trend-row {
        grid-template-columns: 70px 1fr;
        gap: 0.6rem;
      }
      .trend-current {
        grid-column: 2;
        justify-self: end;
        font-size: 0.75rem;
        margin-top: 0.2rem;
      }
      .spark { height: 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <span class="brand"><span class="dot"></span>Health</span>
      <span class="topbar-meta" id="today-date">—</span>
    </header>

    <section class="streaks" id="streaks"></section>

    <section class="cards" id="cards"></section>

    <section class="logger" id="logger" hidden>
      <form class="log-form" id="log-form" autocomplete="off">
        <div class="log-head">
          <span class="log-cat" id="log-cat">—</span>
          <button type="button" class="close-btn" id="log-close" aria-label="close">×</button>
        </div>
        <input type="text" class="log-input log-value" id="log-value" placeholder="value" />
        <input type="text" class="log-input log-note" id="log-note" placeholder="note (optional)" />
        <button type="submit" class="log-submit">log it</button>
      </form>
    </section>

    <h2 class="sec-label">Recent</h2>
    <ul class="recent-list" id="recent-list"></ul>

    <h2 class="sec-label">Last 14 days</h2>
    <div class="trends-rows" id="trends-rows"></div>

    <footer class="page-footer">
      <button class="text-btn" id="export-btn">export json</button>
      <button class="text-btn" id="wipe-btn">wipe data</button>
    </footer>
  </div>

  <script>
    "use strict";

    const STORAGE_KEY = "health.v1.entries";

    const CATEGORIES = [
      { id: "sleep",   label: "Sleep",       placeholder: "7h 30m",   default: "" },
      { id: "workout", label: "Workout",     placeholder: "30 min",   default: "30 min" },
      { id: "weight",  label: "Weight",      placeholder: "182.4",    default: "" },
      { id: "mood",    label: "Mood",        placeholder: "7 / 10",   default: "" },
      { id: "water",   label: "Water",       placeholder: "1 glass",  default: "1", quickAdd: true },
      { id: "mind",    label: "Mindfulness", placeholder: "10 min",   default: "10 min" },
      { id: "meds",    label: "Meds",        placeholder: "taken",    default: "taken" },
      { id: "note",    label: "Note",        placeholder: "anything", default: "" },
    ];
    const CAT_BY_ID = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

    // ─── storage ─────────────────────────────────────────
    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr : null;
      } catch { return null; }
    }
    function save(arr) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    }

    // ─── seed (only on first visit) ──────────────────────
    function seed() {
      const day = 86400000;
      const now = Date.now();
      const at = (offsetDays, hh, mm) => {
        const d = new Date();
        d.setDate(d.getDate() - offsetDays);
        d.setHours(hh, mm, 0, 0);
        return d.getTime();
      };
      const samples = [
        { ts: at(0, 14, 5),  type: "water",   value: "1" },
        { ts: at(0, 11, 20), type: "water",   value: "1" },
        { ts: at(0, 9, 0),   type: "water",   value: "1" },
        { ts: at(0, 7, 30),  type: "sleep",   value: "7h 12m" },
        { ts: at(1, 21, 5),  type: "mood",    value: "7", note: "good day" },
        { ts: at(1, 18, 30), type: "workout", value: "45 min", note: "TAC strength" },
        { ts: at(1, 12, 0),  type: "water",   value: "5" },
        { ts: at(1, 7, 25),  type: "sleep",   value: "6h 40m" },
        { ts: at(2, 20, 15), type: "mind",    value: "15 min" },
        { ts: at(2, 9, 30),  type: "weight",  value: "182.4 lbs" },
        { ts: at(2, 7, 50),  type: "sleep",   value: "7h 30m" },
        { ts: at(3, 18, 0),  type: "workout", value: "30 min", note: "easy run" },
        { ts: at(3, 7, 40),  type: "sleep",   value: "7h 5m" },
        { ts: at(4, 9, 0),   type: "weight",  value: "183.0 lbs" },
        { ts: at(4, 7, 20),  type: "sleep",   value: "6h 55m" },
        { ts: at(5, 19, 0),  type: "workout", value: "60 min", note: "TAC conditioning" },
        { ts: at(5, 7, 30),  type: "sleep",   value: "7h 20m" },
      ];
      return samples.map((s, i) => ({
        id: s.ts - i,
        ts: s.ts,
        type: s.type,
        value: s.value || "",
        note: s.note || "",
      })).sort((a, b) => b.ts - a.ts);
    }

    let entries = load();
    if (!entries) {
      entries = seed();
      save(entries);
    }

    // ─── helpers ─────────────────────────────────────────
    function dayKey(ts) {
      const d = new Date(ts);
      d.setHours(0, 0, 0, 0);
      return d.getTime();
    }

    function lastNDays(n) {
      const out = [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = n - 1; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        out.push(d.getTime());
      }
      return out;
    }

    function streakFor(catId) {
      const days = new Set(entries.filter(e => e.type === catId).map(e => dayKey(e.ts)));
      if (!days.size) return 0;
      let s = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      let cur = today.getTime();
      // grace if today not yet logged: start counting from yesterday
      if (!days.has(cur)) cur -= 86400000;
      while (days.has(cur)) {
        s++;
        cur -= 86400000;
      }
      return s;
    }

    function todayValueFor(catId) {
      const today = dayKey(Date.now());
      const list = entries.filter(e => e.type === catId && dayKey(e.ts) === today);
      if (!list.length) return null;
      if (catId === "water") {
        const total = list.reduce((acc, e) => acc + (parseInt(e.value, 10) || 1), 0);
        return total + " gl";
      }
      return list[0].value || "logged";
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;",
      }[c]));
    }

    function fmtTopDate(d) {
      const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
    }

    function relTime(ts) {
      const d = new Date(ts);
      const diff = Math.round((dayKey(Date.now()) - dayKey(ts)) / 86400000);
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      if (diff === 0) return `today ${hh}:${mm}`;
      if (diff === 1) return `yest ${hh}:${mm}`;
      if (diff < 7) return `${diff}d ago ${hh}:${mm}`;
      return `${d.getMonth() + 1}/${d.getDate()}`;
    }

    // ─── render ──────────────────────────────────────────
    function renderTopbar() {
      document.getElementById("today-date").textContent = fmtTopDate(new Date());
    }

    function renderStreaks() {
      const html = CATEGORIES.map(c => {
        const s = streakFor(c.id);
        const cls = s === 0 ? "streak zero" : "streak";
        return `<span class="${cls}"><b>${s}d</b>${escapeHtml(c.label.toLowerCase())}</span>`;
      }).join("");
      document.getElementById("streaks").innerHTML = html;
    }

    function renderCards() {
      const html = CATEGORIES.map(c => {
        const v = todayValueFor(c.id);
        const display = v || "—";
        const cls = v ? "card-value" : "card-value empty";
        const cardCls = c.quickAdd ? "card water-card" : "card";
        return `
          <button class="${cardCls}" data-cat="${c.id}" type="button">
            <span class="card-label">${escapeHtml(c.label)}</span>
            <span class="${cls}">${escapeHtml(display)}</span>
          </button>
        `;
      }).join("");
      document.getElementById("cards").innerHTML = html;
    }

    function renderRecent() {
      const list = document.getElementById("recent-list");
      const recent = entries.slice(0, 14);
      if (!recent.length) {
        list.innerHTML = `<li class="recent-empty">no entries yet — tap a card above to log something</li>`;
        return;
      }
      list.innerHTML = recent.map(e => {
        const cat = (CAT_BY_ID[e.type] && CAT_BY_ID[e.type].label) || e.type;
        const val = e.value ? `<span class="val">${escapeHtml(e.value)}</span>` : "";
        const note = e.note ? `<span class="note">${escapeHtml(e.note)}</span>` : "";
        return `
          <li data-id="${e.id}">
            <span class="recent-time">${escapeHtml(relTime(e.ts))}</span>
            <span class="recent-body"><span class="cat">${escapeHtml(cat)}</span>${val}${note}</span>
            <button class="recent-del" data-id="${e.id}" aria-label="delete">×</button>
          </li>
        `;
      }).join("");
    }

    function renderTrends() {
      const days = lastNDays(14);
      const html = CATEGORIES.map(c => {
        const counts = days.map(d => entries.filter(e => e.type === c.id && dayKey(e.ts) === d).length);
        const max = Math.max(1, ...counts);
        const bars = counts.map((cnt, i) => {
          const isToday = i === days.length - 1;
          const cls = cnt === 0 ? "bar" : (isToday ? "bar has today" : "bar has");
          const h = cnt === 0 ? 3 : Math.max(5, Math.round((cnt / max) * 28));
          return `<div class="${cls}" style="height:${h}px"></div>`;
        }).join("");
        const v = todayValueFor(c.id);
        const trendCls = v ? "trend-current" : "trend-current empty";
        return `
          <div class="trend-row">
            <span class="trend-label">${escapeHtml(c.label)}</span>
            <div class="spark">${bars}</div>
            <span class="${trendCls}">${escapeHtml(v || "—")}</span>
          </div>
        `;
      }).join("");
      document.getElementById("trends-rows").innerHTML = html;
    }

    function renderAll() {
      renderTopbar();
      renderStreaks();
      renderCards();
      renderRecent();
      renderTrends();
    }

    // ─── logger interaction ──────────────────────────────
    let activeCat = null;
    const loggerEl = document.getElementById("logger");
    const logCatEl = document.getElementById("log-cat");
    const logValueEl = document.getElementById("log-value");
    const logNoteEl = document.getElementById("log-note");

    function openLogger(catId) {
      const conf = CAT_BY_ID[catId];
      if (!conf) return;
      activeCat = catId;
      logCatEl.textContent = conf.label;
      logValueEl.placeholder = conf.placeholder || "";
      logValueEl.value = conf.default || "";
      logNoteEl.value = "";
      loggerEl.hidden = false;
      document.querySelectorAll(".card").forEach(el => {
        el.classList.toggle("active", el.dataset.cat === catId);
      });
      setTimeout(() => {
        logValueEl.focus();
        logValueEl.select();
      }, 50);
    }

    function closeLogger() {
      activeCat = null;
      loggerEl.hidden = true;
      document.querySelectorAll(".card.active").forEach(el => el.classList.remove("active"));
    }

    function appendEntry({ type, value, note }) {
      const ts = Date.now();
      entries = [{ id: ts, ts, type, value: value || "", note: note || "" }, ...entries]
        .sort((a, b) => b.ts - a.ts);
      save(entries);
      renderAll();
      const first = document.querySelector(".recent-list li");
      if (first) {
        first.classList.add("flash");
        setTimeout(() => first.classList.remove("flash"), 900);
      }
    }

    function deleteEntry(id) {
      entries = entries.filter(e => String(e.id) !== String(id));
      save(entries);
      renderAll();
    }

    document.getElementById("cards").addEventListener("click", (ev) => {
      const card = ev.target.closest(".card");
      if (!card) return;
      const cat = card.dataset.cat;
      if (cat === "water") {
        // quick-add 1 glass, no form
        appendEntry({ type: "water", value: "1", note: "" });
        return;
      }
      if (activeCat === cat) closeLogger();
      else openLogger(cat);
    });

    document.getElementById("log-close").addEventListener("click", closeLogger);

    document.getElementById("log-form").addEventListener("submit", (ev) => {
      ev.preventDefault();
      if (!activeCat) return;
      const value = logValueEl.value.trim();
      const note = logNoteEl.value.trim();
      if (!value && !note) return;
      appendEntry({ type: activeCat, value, note });
      closeLogger();
    });

    document.getElementById("recent-list").addEventListener("click", (ev) => {
      const btn = ev.target.closest(".recent-del");
      if (!btn) return;
      ev.stopPropagation();
      if (!confirm("delete this entry?")) return;
      deleteEntry(btn.dataset.id);
    });

    document.getElementById("wipe-btn").addEventListener("click", () => {
      if (!confirm("wipe all health data? this cannot be undone.")) return;
      localStorage.removeItem(STORAGE_KEY);
      entries = seed();
      save(entries);
      renderAll();
    });

    document.getElementById("export-btn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `health-export-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    // close logger on Escape
    document.addEventListener("keydown", (ev) => {
      if (ev.key === "Escape" && activeCat) closeLogger();
    });

    renderAll();
  </script>
</body>
</html>
